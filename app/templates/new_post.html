{% extends "base.html" %}

{% block content %}

<h1 class="section-title">
  新規作業ログ
</h1>

<form
  action="/posts-page"
  method="post"
  class="form-card"
>
  <div class="form-group">
    <label>作業ログ</label>

    <textarea
      class="form-textarea"
      name="content"
    ></textarea>
  </div>

  <div class="form-group">
    <label>開始時刻</label>

    <input
      class="form-input"
      type="datetime-local"
      name="start_time"
    >
  </div>

  <div class="form-group">
    <label>終了時刻</label>

    <input
      class="form-input"
      type="datetime-local"
      name="end_time"
    >
  </div>

  <div class="form-group">
    <label>関連する制作物</label>

    <select
      class="form-input"
      name="work_id"
    >
      <option value="">
        選択なし
      </option>

      {% for work in works %}
        <option
          value="{{ work.id }}"
          {% if work.id == selected_work_id %}selected{% endif %}
        >
          {{ work.title }}
        </option>
      {% endfor %}
    </select>
  </div>

  <button
    type="submit"
    class="primary-button"
  >
    作業ログを登録する
  </button>
</form>

<a
  href="/works-page/{{ selected_work_id }}"
  class="btn-back"
>
  制作物詳細へ戻る
</a>

{% endblock %}
