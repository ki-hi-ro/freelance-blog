{% extends "base.html" %}

{% block content %}

  <h1>新規作業ログ</h1>

  <form action="/posts-page" method="post" class="post-form">
    <label>作業ログ</label>
    <textarea name="content"></textarea>

    <label>開始時刻</label>
    <input type="datetime-local" name="start_time">

    <label>終了時刻</label>
    <input type="datetime-local" name="end_time">

    <label>関連Work</label>
    <select name="work_id">
      <option value="">選択なし</option>
      {% for work in works %}
        <option value="{{ work.id }}" {% if work.id == selected_work_id %}selected{% endif %}>
          {{ work.title }}
        </option>
      {% endfor %}
    </select>

  <button type="submit">作業ログを登録する</button>
</form>

  <p>
    <a href="/works-page/{{ selected_work_id }}">成果物詳細へ戻る</a>
  </p>
</body>
</html>

{% endblock %}
