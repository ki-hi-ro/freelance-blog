<link rel="stylesheet" href="/static/style.css">

<h1>Freelance Work Log</h1>
<p>成果物ごとの開発ログを記録し、技術と成長を可視化するサービスです。</p>

<nav>
  <a href="/works-page/new">新規Workを登録する</a>
</nav>

<hr>

<h2>成果物一覧</h2>

<div class="work-grid">
  {% for work in works %}
    <div class="work-card">
      <h2>{{ work.title }}</h2>
      <p>{{ work.description | safe }}</p>
      <p><strong>技術:</strong> {{ work.tech_stack }}</p>

      <div class="work-actions">
        <a href="/works-page/{{ work.id }}">開発記録を見る</a>
      </div>

      <div class="work-actions">
        <a href="{{ work.github_url }}">GitHub</a>
        <a href="{{ work.public_url }}">公開URL</a>
      </div>
    </div>
  {% endfor %}
</div>
