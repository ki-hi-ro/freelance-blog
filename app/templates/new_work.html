{% extends "base.html" %}

{% block content %}

  <h1>新規Work登録</h1>

  <form action="/works-page" method="post">
    <div>
      <label>タイトル</label>
      <input type="text" name="title">
    </div>

    <div>
      <label>説明</label>
      <textarea name="description"></textarea>
    </div>

    <div>
      <label>GitHub URL</label>
      <input type="text" name="github_url">
    </div>

    <div>
      <label>公開URL</label>
      <input type="text" name="public_url">
    </div>

    <div>
      <label>技術（カンマ区切り）</label>
      <input type="text" name="tech_stack">
    </div>

    <label>画像URL</label>
    <input type="text" name="image_url">    

    <button type="submit">登録する</button>
  </form>

  <p>
    <a href="/works-page">成果物一覧へ戻る</a>
  </p>
  
{% endblock %}
