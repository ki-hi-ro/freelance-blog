<!DOCTYPE html>
<html>
<head>
    <title>{{ work.title }}</title>
    <link rel="stylesheet" href="/static/style.css">
</head>

<body>

<div class="work-detail">
  <h1>{{ work.title }}</h1>
  <p>{{ work.description }}</p>

  <p class="work-meta">使用技術: {{ work.tech_stack }}</p>

  <div class="work-links">
    <a href="{{ work.github_url }}">GitHub</a>
    <a href="{{ work.public_url }}">公開URL</a>
  </div>
</div>

<h2>開発ログ</h2>

<a href="/posts-page/new?work_id={{ work.id }}">このWorkに作業ログを追加する</a>

<div class="timeline">
  {% for post in posts %}
    <div class="timeline-item">
      <div class="timeline-marker"></div>

      <div class="timeline-card">
        <p class="timeline-date">
          {{ post.start_time.strftime('%Y.%m.%d %H:%M') }}
        </p>

        <h3>{{ post.title }}</h3>

        <p>{{ post.content[:80] }}...</p>

        <p>
          <strong>所要時間:</strong>
          {{ post.work_time_minutes }}分
        </p>

        <a href="/posts-page/{{ post.id }}">詳細を見る</a>
      </div>
    </div>
  {% endfor %}
</div>

</body>
</html>
