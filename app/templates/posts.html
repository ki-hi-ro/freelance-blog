{% extends "base.html" %}

{% block content %}

<h1 class="section-title">
  作業ログ一覧
</h1>

{% for post in posts %}
  <div class="post-card">
    <h2>
      {{ post.title }}
    </h2>

    <div>
      {{ post.content[:120] | safe }}
    </div>

    <p>
      作業種別: {{ post.task_type }}
    </p>

    {% if post.work %}
      <p>
        関連する制作物:
        <a href="/works-page/{{ post.work.id }}">
          {{ post.work.title }}
        </a>
      </p>
    {% endif %}

    <p>
      作業時間: {{ post.work_time_minutes }}分
    </p>

    <div class="post-actions">
      <a
        href="/posts-page/{{ post.id }}"
        class="btn-outline"
      >
        詳細を見る
      </a>

      <a
        href="/posts-page/{{ post.id }}/edit"
        class="btn-outline"
      >
        編集
      </a>

      <form
        action="/posts-page/{{ post.id }}/delete"
        method="post"
      >
        <button
          type="submit"
          class="btn-danger"
        >
          削除
        </button>
      </form>
    </div>
  </div>
{% endfor %}

{% endblock %}
