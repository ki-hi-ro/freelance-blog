<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>Freelance Blog Service</title>
</head>
<body>
    <h1>Freelance Blog Service</h1>
    <p>開発ログ・進捗共有・技術記事を可視化するブログサービスです。</p>

    <hr>
    
    <h2>新規投稿</h2>

    <form action="/posts-page" method="post">
    <div>
        <label>タイトル</label><br>
        <input type="text" name="title">
    </div>

    <div>
        <label>本文</label><br>
        <textarea name="content"></textarea>
    </div>

    <div>
        <label>タグ（カンマ区切り）</label><br>
        <input type="text" name="tags">
    </div>

    <div>
        <label>作業時間（分）</label><br>
        <input type="number" name="work_time_minutes">
    </div>

    <button type="submit">投稿する</button>
    </form>

    <hr>    

    {% for post in posts %}
        <article>
            <h2>{{ post.title }}</h2>
            <p>{{ post.content }}</p>
            <p>タグ: {{ post.tags }}</p>
            <p>作業時間: {{ post.work_time_minutes }}分</p>
            <p>作成日時: {{ post.created_at }}</p>
        </article>
        <hr>
    {% endfor %}
</body>
</html>
