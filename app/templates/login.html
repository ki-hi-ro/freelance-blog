{% extends "base.html" %}

{% block content %}

<h1 class="section-title">
  ログイン
</h1>

{% if error %}
  <div class="error-message">
    {{ error }}
  </div>
{% endif %}

<form
  action="/login"
  method="post"
  class="form-card"
>

  <div class="form-group">
    <label>
      ユーザー名
    </label>

    <input
      type="text"
      name="username"
      class="form-input"
      required
    >
  </div>

  <div class="form-group">
    <label>
      パスワード
    </label>

    <input
      type="password"
      name="password"
      class="form-input"
      required
    >
  </div>

  <button
    type="submit"
    class="primary-button"
  >
    ログイン
  </button>

</form>

{% endblock %}
