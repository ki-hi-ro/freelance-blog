<h1>記事編集</h1>

<form action="/posts-page/{{ post.id }}/edit" method="post">
  <div>
    <label>タイトル</label><br>
    <input type="text" name="title" value="{{ post.title }}">
  </div>

  <div>
    <label>本文</label><br>
    <textarea name="content">{{ post.content }}</textarea>
  </div>

  <div>
    <label>タグ（カンマ区切り）</label><br>
    <input type="text" name="tags" value="{{ post.tags }}">
  </div>

  <div>
    <label>作業時間（分）</label><br>
    <input type="number" name="work_time_minutes" value="{{ post.work_time_minutes }}">
  </div>

  <button type="submit">更新する</button>
</form>

<a href="/posts-page">一覧へ戻る</a>
