<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>My Portfolio</title>
  <link rel="stylesheet" href="/static/style.css">
</head>

<body>
  <header class="site-header">
    <div class="site-header-top">
      <h1 class="site-title">
        <a href="/">My Portfolio</a>
      </h1>

      {% if is_logged_in %}
      <a
        href="/logout"
        class="login-link"
      >
        ログアウト
      </a>
      {% else %}
      <a
        href="/login"
        class="login-link"
      >
        ログイン
      </a>
      {% endif %}
    </div>

    <p class="site-description">
      制作物・技術ブログ・職務経歴をまとめたポートフォリオサイトです。
    </p>

    <hr>
  </header>

  <main>
    {% block content %}
    {% endblock %}
  </main>
</body>
</html>
