{% extends "base.html" %}

{% block content %}

<div class="page-header">
  <div>
    <h2 class="section-title">作業ログ詳細</h2>
    <h3 class="work-page-title">{{ post.work.title }}</h3>
  </div>

  <a href="/works-page/{{ post.work_id }}" class="btn-back">
    ← 成果物詳細へ戻る
  </a>
</div>

<article class="detail-card post-detail-card">

  <div class="post-detail-header">
    <p class="post-label">作業ログ</p>
    <h1 class="post-detail-title">{{ post.title }}</h1>
  </div>

  <div class="post-content">
    {{ post.content | safe }}
  </div>

  <div class="post-meta-list">
    <p>⏱ 作業時間：{{ duration_minutes }}分</p>
    <p>📅 作成日時：{{ post.created_at.strftime('%Y.%m.%d %H:%M') }}</p>
  </div>

  <div class="post-actions">
    <a href="/posts-page/{{ post.id }}/edit" class="btn-outline">編集する</a>
  </div>

</article>

{% endblock %}
