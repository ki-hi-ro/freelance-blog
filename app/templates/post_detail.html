{% extends "base.html" %}

{% block content %}

  <div class="post-card">
    <h1>{{ post.title }}</h1>

    <div class="content">
      {{ post.content | safe }}
    </div>

    <p>タグ: {{ post.tags }}</p>
    <p>作業時間: {{ post.work_time_minutes }}分</p>
    <p>作成日時: {{ post.created_at }}</p>

    <a href="/works-page/{{ post.work_id }}" class="btn-back">
      成果物詳細へ戻る
    </a>
  </div>

{% endblock %}
