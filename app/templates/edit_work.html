{% extends "base.html" %}

{% block content %}

  <h1>成果物編集</h1>

  <form action="/works-page/{{ work.id }}/edit" method="post">
    <label>タイトル</label>
    <input type="text" name="title" value="{{ work.title }}">

    <label>説明</label>
    <textarea name="description">{{ work.description }}</textarea>

    <label>GitHub URL</label>
    <input type="text" name="github_url" value="{{ work.github_url }}">

    <label>公開URL</label>
    <input type="text" name="app_url" value="{{ work.app_url }}">

    <label>技術（カンマ区切り）</label>
    <input type="text" name="tech_stack" value="{{ work.tech_stack }}">

    <label>画像URL</label>
    <input type="text" name="image_url" value="{{ work.image_url }}">    

    <button type="submit">更新する</button>
  </form>

  <p>
    <a href="/works-page/{{ work.id }}">成果物詳細へ戻る</a>
  </p>
  
{% endblock %}
